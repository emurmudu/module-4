<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudo</title>
    <style>
        ul {
            list-style-type: none;
        }
        li:nth-child(2) {
            color: rgb(222, 18, 18);
        }
        .spain::after {
            content: "⭐⭐⭐⭐⭐";
        }
        .argentina::after {
            content: "⭐⭐⭐⭐";
        }
        .france::after {
            content: "⭐⭐";
        }
        .brazil::after {
            content: "⭐⭐⭐";
        }
        .spain::before {
            content: "✔";
        }   
        ul::first-line {
            font-weight: bold;
            background-color: rgb(10, 201, 16);
        }

    </style>
</head>

<body>
    <ul>
        <li class="spain">Spain</li>
        <li class="argentina">Argentina</li>
        <li class="france">France</li>
        <li class="brazil">Brazil</li>
    </ul>
</body>

</html>
